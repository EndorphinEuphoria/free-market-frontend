<nav class="navbar navbar-expand-lg" [class.navbar--scrolled]="isScrolled()">
  <div class="container-fluid px-4">

    <!-- Brand -->
    <a class="navbar-brand brand-name" routerLink="/home">FreeMarket</a>

    <!-- Mobile toggle -->
    <button
      class="navbar-toggler border-0 shadow-none"
      type="button"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen()"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible section — Bootstrap collapse class needed -->
    <div class="navbar-collapse" [class.show]="isMobileMenuOpen()">

      <!-- Nav links — centered -->
      <ul class="navbar-nav mx-auto gap-1 mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="nav-link--active"
            [routerLinkActiveOptions]="{exact:true}">Home</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown"
            aria-expanded="false">Shop</a>
          <ul class="dropdown-menu border-0 shadow-sm">
            <!-- BACKEND: generar categorías dinámicamente desde CategoryService -->
            <li><a class="dropdown-item" href="#">All Products</a></li>
            <li><a class="dropdown-item" href="#">New Arrivals</a></li>
            <li><a class="dropdown-item" href="#">Sale</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="nav-link--active">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/blog" routerLinkActive="nav-link--active">Blog</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="nav-link--active">Contact</a>
        </li>
      </ul>

      <!-- Right actions -->
      <div class="d-flex align-items-center gap-3">
        
           <!-- Search -->
          <button class="icon-btn" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
              <path d="m16.5 16.5 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        @if (auth.isLoggedIn()) {
          <span class="nav-user-name">{{ auth.currentUser()?.name }}</span>
          <button class="btn btn-link nav-link p-0" (click)="auth.logout()">Logout</button>
        } @else {
          <a routerLink="/login" class="nav-action-link d-flex align-items-center gap-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Login / Register</span>
          </a>
        }

        

      </div>
    </div>
  </div>
</nav>
